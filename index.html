<!DOCTYPE html>
<html>
<head>
<title>MindBloom 🌸</title>
<link rel="stylesheet" href="style.css">

<!-- Google font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<button class="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="app">

<!-- SLIDE 1 PROFILE -->
<section id="slide1">
<h1>MindBloom 🌸</h1>
<p class="tag">Track your mind. Grow daily.</p>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="gender" placeholder="Gender">
<input id="email" placeholder="Email">

<button class="mainBtn" onclick="saveProfile()">Next →</button>
</section>


<!-- SLIDE 2 MOOD -->
<section id="slide2" class="hidden">
<h2 id="greeting"></h2>
<h3>How are you feeling today?</h3>

<div class="moods">
<span onclick="selectMood('happy')">😄</span>
<span onclick="selectMood('okay')">🙂</span>
<span onclick="selectMood('sad')">😢</span>
<span onclick="selectMood('angry')">😡</span>
<span onclick="selectMood('tired')">😴</span>
</div>

<div id="quoteBox"></div>

<h3>Your Goal 🎯</h3>
<input id="goalInput" placeholder="Drink water / Study 2hr">
<button onclick="saveGoal()">Add</button>
<ul id="goalList"></ul>

<button class="mainBtn" onclick="goReport()">View Weekly Report →</button>
</section>


<!-- SLIDE 3 REPORT -->
<section id="slide3" class="hidden">
<h2>Your Weekly Mood Report 📊</h2>
<canvas id="chart"></canvas>
</section>

</div>
<script src="script.js"></script>
</body>
</html>
