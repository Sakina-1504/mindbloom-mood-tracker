<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindGlow</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  text-align:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
  color:#333;
}

/* moon */
.moon{
 position:fixed;
 bottom:15px;
 right:15px;
 font-size:35px;
}

.slide{display:none;padding:40px;}
.active{display:block;}

.card{
 background:white;
 max-width:420px;
 margin:auto;
 padding:30px;
 border-radius:20px;
 box-shadow:0 10px 25px rgba(0,0,0,.2);
}

input,select{
 width:90%;
 padding:12px;
 margin:12px;
 border-radius:10px;
 border:1px solid #ccc;
 font-size:16px;
}

button{
 padding:14px 35px;
 border:none;
 border-radius:30px;
 background:#ff758c;
 color:white;
 font-size:18px;
 cursor:pointer;
 margin-top:15px;
}

.emoji{
 font-size:38px;
 cursor:pointer;
 padding:10px;
 transition:.2s;
}
.emoji:hover{transform:scale(1.3)}

#popup{
 display:none;
 background:#fff0f5;
 padding:20px;
 border-radius:15px;
 margin-top:20px;
}
</style>
</head>

<body>

<div class="moon">🌙</div>
<h1>MindGlow</h1>
<p>Track your mind, glow daily</p>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1">
<div class="card">
<h2>Your Details</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">

<select id="gender">
<option value="">Select Gender</option>
<option>Female</option>
<option>Male</option>
</select>

<button onclick="saveUser()">Next ➜</button>
</div>
</div>

<!-- SLIDE 2 -->
<div class="slide" id="slide2">
<div class="card">
<h2 id="hello"></h2>
<h3>How are you feeling today?</h3>

<span class="emoji" onclick="selectMood('happy')">😊</span>
<span class="emoji" onclick="selectMood('sad')">😔</span>
<span class="emoji" onclick="selectMood('angry')">😤</span>
<span class="emoji" onclick="selectMood('love')">🥰</span>
<span class="emoji" onclick="selectMood('tired')">😴</span>
<span class="emoji" onclick="selectMood('excited')">🤩</span>
<span class="emoji" onclick="selectMood('stressed')">😰</span>
<span class="emoji" onclick="selectMood('calm')">😌</span>

<div id="popup">
<h3 id="quote"></h3>
<p id="tip"></p>
<button onclick="goToChart()">See Weekly Report ➜</button>
</div>

</div>
</div>

<!-- SLIDE 3 -->
<div class="slide" id="slide3">
<div class="card">
<h2>Your Weekly Mood Report</h2>
<canvas id="chart"></canvas>
</div>
</div>

<script>
let firstTime = !localStorage.getItem("visited");

if(!firstTime){
 let user=JSON.parse(localStorage.getItem("user"));
 if(user){
  document.getElementById("name").value=user.name;
  document.getElementById("email").value=user.email;
  document.getElementById("gender").value=user.gender;
 }
}
localStorage.setItem("visited",true);

function saveUser(){
 let name=nameInput.value;
 let email=emailInput.value;
 let gender=genderInput.value;
 if(!name||!email||!gender){alert("Fill all fields");return;}
 localStorage.setItem("user",JSON.stringify({name,email,gender}));
 showSlide(2);
 hello.innerText="Hello "+name+" 💛";
}

function showSlide(n){
 document.querySelectorAll(".slide").forEach(s=>s.classList.remove("active"));
 document.getElementById("slide"+n).classList.add("active");
}

const quotes={
happy:"You’re glowing today ✨",
sad:"Storms pass, sunshine stays ☀️",
angry:"Pause. Breathe. Reset 🌿",
love:"Your heart is beautiful 💖",
tired:"Rest is productive 💤",
excited:"Big things coming 🚀",
stressed:"One step at a time 🌼",
calm:"Peace looks good on you 🌸"
};

const tips={
happy:"Share your smile today 😊",
sad:"Call a loved one 💛",
angry:"Take a 5-min break 🌿",
love:"Write gratitude list 💖",
tired:"Drink water & rest 😴",
excited:"Write your goals ✍️",
stressed:"Take a short walk 🚶",
calm:"Do 5-min meditation 🧘"
};

function selectMood(mood){
 quote.innerText=quotes[mood];
 tip.innerText=tips[mood];
 popup.style.display="block";

 let week=JSON.parse(localStorage.getItem("week"))||[];
 week.push(mood);
 localStorage.setItem("week",JSON.stringify(week));
}

function goToChart(){
 showSlide(3);
 let week=JSON.parse(localStorage.getItem("week"))||[];
 let count={happy:0,sad:0,angry:0,love:0,tired:0,excited:0,stressed:0,calm:0};
 week.forEach(m=>count[m]++);
 new Chart(chart,{type:"bar",data:{labels:Object.keys(count),datasets:[{data:Object.values(count)}]}});
}
</script>

</body>
</html>
