<style>
*{box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#89f7fe,#66a6ff,#c3cfe2);
  color:#333;
  transition:.4s;
  padding:20px;
}

/* DARK MODE */
.dark{
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

/* Header */
h1{margin-bottom:5px}
p{margin-top:0;margin-bottom:20px}

/* 🌙 Moon */
.moon{
 position:fixed;
 bottom:20px;
 right:20px;
 font-size:38px;
 cursor:pointer;
}

/* Slides */
.slide{display:none;width:100%}
.active{display:block}

/* Card responsive */
.card{
 background:white;
 width:100%;
 max-width:420px;
 padding:30px;
 border-radius:22px;
 box-shadow:0 15px 35px rgba(0,0,0,.15);
}
.dark .card{background:#1e293b}

/* Inputs */
input,select{
 width:100%;
 padding:14px;
 margin:10px 0;
 border-radius:12px;
 border:1px solid #ccc;
 font-size:16px;
}

/* Button */
button{
 width:100%;
 padding:16px;
 border:none;
 border-radius:30px;
 background:#4facfe;
 color:white;
 font-size:18px;
 cursor:pointer;
 margin-top:15px;
}

/* Emojis responsive */
.emoji{
 font-size:36px;
 cursor:pointer;
 padding:8px;
 display:inline-block;
}
.emoji:hover{transform:scale(1.2)}

/* Popup */
#popup{
 display:none;
 background:#f0f8ff;
 padding:20px;
 border-radius:15px;
 margin-top:20px;
}
.dark #popup{background:#334155}

/* Quote + Tip */
#quote{font-size:24px;color:#7c3aed;font-weight:bold;}
#tip{font-size:18px;color:#16a34a;}
.dark #quote{color:#c084fc;}
.dark #tip{color:#4ade80}

/* 📱 Mobile tweaks */
@media(max-width:500px){
 h1{font-size:26px}
 .emoji{font-size:32px}
}
</style>
