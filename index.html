<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBloom</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SLIDE 1 -->
<div id="slide1" class="screen">
  <h1>MindBloom 🌿</h1>
  <p>Track your mind. Grow daily.</p>
  <input id="name" placeholder="Your Name">
  <input id="email" placeholder="Email">
  <button onclick="goToMood()">Next →</button>
</div>

<!-- SLIDE 2 -->
<div id="slide2" class="screen hidden">
  <h2>Select Your Mood Today</h2>
  <div class="moods">
    <span onclick="selectMood('Happy')">😄</span>
    <span onclick="selectMood('Okay')">🙂</span>
    <span onclick="selectMood('Sad')">😢</span>
    <span onclick="selectMood('Angry')">😡</span>
    <span onclick="selectMood('Tired')">😴</span>
  </div>
  <button id="nextBtn" class="hidden" onclick="goToChart()">View Progress →</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popupBox">
    <h2 id="quote"></h2>
    <button onclick="closePopup()">Continue</button>
  </div>
</div>

<!-- SLIDE 3 -->
<div id="slide3" class="screen hidden">
  <h2>Your Mood Progress 📊</h2>
  <h3 id="streak"></h3>
  <canvas id="chart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
