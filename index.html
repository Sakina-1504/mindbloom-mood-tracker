<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBloom 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>MindBloom 🌸</h1>
<h2 id="welcomeText"></h2>

<h3>How do you feel today?</h3>

<div class="moods">
<button class="mood" onclick="selectMood('Happy')">😄</button>
<button class="mood" onclick="selectMood('Okay')">😐</button>
<button class="mood" onclick="selectMood('Sad')">😢</button>
<button class="mood" onclick="selectMood('Angry')">😡</button>
<button class="mood" onclick="selectMood('Tired')">😴</button>
</div>

<textarea id="note" placeholder="What's on your mind?"></textarea>

<button onclick="nextStep()">Next ➡️</button>

<h3>🔥 Streak: <span id="streak">0</span> days</h3>
<p id="weeklyReport"></p>

<button onclick="resetWeek()">Reset Week</button>

</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>✨ Saved Successfully ✨</h2>
    <p>You are doing amazing 💖</p>
    <button onclick="closePopup()">Continue</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
