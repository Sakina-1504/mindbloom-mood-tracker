<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBloom</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SLIDE 1 : USER DETAILS -->
<div id="slide1" class="screen">
  <h1>MindBloom 🌸</h1>
  <p>Track your mind. Grow daily.</p>
  <input id="name" placeholder="Your Name">
  <input id="email" placeholder="Email">
  <button onclick="saveUser()">Next →</button>
</div>

<!-- SLIDE 2 : MOOD -->
<div id="slide2" class="screen hidden">
  <h2>How are you feeling today?</h2>
  <div class="moods">
    <span onclick="selectMood('Happy')">😄</span>
    <span onclick="selectMood('Okay')">🙂</span>
    <span onclick="selectMood('Sad')">😢</span>
    <span onclick="selectMood('Angry')">😡</span>
    <span onclick="selectMood('Tired')">😴</span>
  </div>

  <h3 id="message"></h3>
  <p id="selfcare"></p>

  <button id="nextBtn" class="hidden" onclick="goToReport()">View Weekly Report →</button>
</div>

<!-- SLIDE 3 : REPORT -->
<div id="slide3" class="screen hidden">
  <h2>Your Weekly Mood Review 📊</h2>
  <h3 id="streak"></h3>
  <canvas id="chart"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
