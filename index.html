<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBloom</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Onboarding -->
<div id="onboarding" class="centerBox">
  <h1>MindBloom 🌿</h1>
  <p>Track your mind. Grow daily.</p>
  <input id="name" placeholder="Your Name">
  <input id="email" placeholder="Email">
  <button onclick="startApp()">Continue</button>
</div>

<!-- Dashboard -->
<div id="app" class="hidden">

<header>
  <h2 id="greeting"></h2>
</header>

<div class="grid">

  <!-- Mood Card -->
  <div class="card">
    <h3>How are you feeling today?</h3>
    <div class="moods">
      <span onclick="selectMood('Happy')">😄</span>
      <span onclick="selectMood('Okay')">🙂</span>
      <span onclick="selectMood('Sad')">😢</span>
      <span onclick="selectMood('Angry')">😡</span>
      <span onclick="selectMood('Tired')">😴</span>
    </div>
    <p id="feedback"></p>
  </div>

  <!-- Task Card -->
  <div class="card">
    <h3>Today's Self-Care 🌱</h3>
    <p id="task"></p>
  </div>

  <!-- Streak Card -->
  <div class="card">
    <h3>🔥 Your Streak</h3>
    <p id="streak"></p>
  </div>

  <!-- Chart -->
  <div class="card">
    <h3>Weekly Mood Insight</h3>
    <canvas id="chart"></canvas>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
