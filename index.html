<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindBloom</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- PROFILE -->
<div id="profile" class="card">
<h1>MindBloom 🌸</h1>
<input id="name" placeholder="Your Name">
<input id="email" placeholder="Email">
<input id="city" placeholder="City">
<button onclick="saveProfile()">Start Journey ✨</button>
</div>

<!-- APP -->
<div id="app" class="card hidden">
<h1 id="welcome"></h1>

<h3 id="task"></h3>

<h2>Select your mood today</h2>

<div class="moodRow">
<span class="mood" onclick="selectMood(this,'Happy')">😄</span>
<span class="mood" onclick="selectMood(this,'Okay')">🙂</span>
<span class="mood" onclick="selectMood(this,'Sad')">😢</span>
<span class="mood" onclick="selectMood(this,'Angry')">😡</span>
<span class="mood" onclick="selectMood(this,'Tired')">😴</span>
</div>

<h3 id="thought"></h3>

<h3>🔥 Streak: <span id="streak">0</span></h3>

</div>

<script src="script.js"></script>
</body>
</html>
